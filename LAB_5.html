<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table - Lab 5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }

        .force-border { border-right: 1px solid #d1d5db !important; }
        .force-hover:hover td { background-color: #e5e7eb !important; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-6xl mx-auto bg-white border border-gray-300 shadow-md rounded-lg overflow-hidden">

    <div class="flex items-center justify-between p-4 border-b border-gray-200 bg-white">
        <div class="flex items-center space-x-4">
            <div class="flex items-center border border-gray-300 rounded p-1 px-2 cursor-pointer hover:bg-gray-50">
                <input type="checkbox" id="selectAll" class="w-4 h-4 cursor-pointer">
                <label for="selectAll" class="ml-1 text-[10px] cursor-pointer select-none">▼</label>
            </div>
            <div class="flex border border-gray-300 rounded overflow-hidden shadow-sm">
                <button class="px-4 py-1.5 bg-gray-50 text-gray-500 border-r border-gray-300 hover:bg-gray-100 flex items-center">
                    <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                    Card
                </button>
                <button class="px-4 py-1.5 bg-white text-blue-600 font-bold flex items-center">

                    List
                </button>
            </div>
        </div>

        <div class="flex space-x-6 text-sm font-semibold text-gray-500">
            <button class="hover:text-blue-600 flex items-center">
                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Display
            </button>
            <button class="hover:text-blue-600 flex items-center">
                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"></path></svg>
                Sort by
            </button>
            <button class="hover:text-blue-600 flex items-center">
                <svg class="w-4 h-4 mr-1.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 5v.01M12 12v.01M12 19v.01M12 6a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2zm0 7a1 1 0 110-2 1 1 0 010 2z"></path></svg>
                Actions

        </div>
    </div>

    <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
            <tr class="bg-[#333333] text-white text-[13px]">
                <th class="p-4 font-medium force-border w-1/3">Address</th>
                <th class="p-4 font-medium text-center">Property Type</th>
                <th class="p-4 font-medium text-center">Beds</th>
                <th class="p-4 font-medium text-center">Sq Ft</th>
                <th class="p-4 font-medium text-right pr-8">Owner Email</th>
            </tr>
            </thead>
            <tbody class="text-[13px] text-gray-700">

            <tr class="force-hover border-b border-gray-200 transition-colors">
                <td class="p-4 force-border">
                    <div class="flex items-start space-x-3">
                        <input type="checkbox" id="row1" class="mt-1 w-4 h-4 cursor-pointer">
                        <label for="row1" class="cursor-pointer select-none">
                            <div class="font-bold text-gray-900 uppercase">741 OTT ST</div>
                            <div class="text-[11px] text-gray-400">BRANCHVILLE, SC, 29432</div>
                        </label>
                    </div>
                </td>
                <td class="p-4 text-center italic text-gray-500">Single Family Residential</td>
                <td class="p-4 text-center">3</td>
                <td class="p-4 text-center">1,356</td>
                <td class="p-4 text-right pr-8">
                    <button class="text-gray-400 hover:text-blue-600 inline-flex">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />

            </tr>

            <tr class="force-hover border-b border-gray-200 transition-colors">
                <td class="p-4 force-border">
                    <div class="flex items-start space-x-3">
                        <input type="checkbox" id="row2" class="mt-1 w-4 h-4 cursor-pointer">
                        <label for="row2" class="cursor-pointer select-none">
                            <div class="font-bold text-gray-900 uppercase">130 HUNTER ST</div>
                            <div class="text-[11px] text-gray-400">BRANCHVILLE, SC, 29432</div>
                        </label>
                    </div>
                </td>
                <td class="p-4 text-center italic text-gray-500">Single Family Residential</td>
                <td class="p-4 text-center">2</td>
                <td class="p-4 text-center">1,383</td>
                <td class="p-4 text-right pr-8">
                    <button class="text-gray-400 hover:text-blue-600 inline-flex">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />
                        </svg>

            <tr class="force-hover border-b border-gray-200 transition-colors">
                <td class="p-4 force-border">
                    <div class="flex items-start space-x-3">
                        <input type="checkbox" id="row3" class="mt-1 w-4 h-4 cursor-pointer">
                        <label for="row3" class="cursor-pointer select-none">
                            <div class="font-bold text-gray-900 uppercase">7685 FREEDOM RD</div>
                            <div class="text-[11px] text-gray-400">BRANCHVILLE, SC, 29432</div>
                        </label>
                    </div>
                </td>
                <td class="p-4 text-center italic text-gray-500">Mobile/Manufactured Home</td>
                <td class="p-4 text-center">3</td>
                <td class="p-4 text-center">1,344</td>
                <td class="p-4 text-right pr-8"></td>
            </tr>

            <tr class="force-hover border-b border-gray-200 transition-colors">
                <td class="p-4 force-border">
                    <div class="flex items-start space-x-3">
                        <input type="checkbox" id="row4" class="mt-1 w-4 h-4 cursor-pointer">
                        <label for="row4" class="cursor-pointer select-none">
                            <div class="font-bold text-gray-900 uppercase">7315 FREEDOM RD</div>
                            <div class="text-[11px] text-gray-400">BRANCHVILLE, SC, 29432</div>
                        </label>
                    </div>

                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />
                        </svg>
                    </button>
                </td>
            </tr>

            <tr class="force-hover border-b border-gray-200 transition-colors">
                <td class="p-4 force-border">
                    <div class="flex items-start space-x-3">
                        <input type="checkbox" id="row5" class="mt-1 w-4 h-4 cursor-pointer">
                        <label for="row5" class="cursor-pointer select-none">
                            <div class="font-bold text-gray-900 uppercase">490 FAIREY ST</div>
                            <div class="text-[11px] text-gray-400">BRANCHVILLE, SC, 29432</div>
                        </label>
                    </div>
                </td>
                <td class="p-4 text-center italic text-gray-500">Single Family Residential</td>
                <td class="p-4 text-center">4</td>
                <td class="p-4 text-center">2,484</td>
                <td class="p-4 text-right pr-8">
                    <button class="text-gray-400 hover:text-blue-600 inline-flex">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />

            <tr class="force-hover transition-colors">
                <td class="p-4 force-border">
                    <div class="flex items-start space-x-3">
                        <input type="checkbox" id="row6" class="mt-1 w-4 h-4 cursor-pointer">
                        <label for="row6" class="cursor-pointer select-none">
                            <div class="font-bold text-gray-900 uppercase">1051 OTT ST</div>

                <td class="p-4 text-right pr-8">
                    <button class="text-gray-400 hover:text-blue-600 inline-flex">
                        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7" />
